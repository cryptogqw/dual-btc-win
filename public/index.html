<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>BTC 双币赢决策终端</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg-primary:#0a0e17;--bg-card:#111827;--bg-card-alt:#0f1729;
--border:#1e293b;--border-active:#334155;
--text-primary:#e2e8f0;--text-secondary:#94a3b8;--text-muted:#64748b;
--green:#10b981;--green-glow:#10b98140;--green-bg:#10b98115;
--red:#ef4444;--red-glow:#ef444440;--red-bg:#ef444415;
--yellow:#f59e0b;--yellow-glow:#f59e0b40;--yellow-bg:#f59e0b15;
--blue:#3b82f6;--blue-glow:#3b82f640;
--cyan:#06b6d4;--cyan-glow:#06b6d440;
--purple:#a855f7;--purple-glow:#a855f740;
--orange:#f97316;
}
html{font-size:18px;--fs-base:18}
html.fs-sm{font-size:14px;--fs-base:14}
html.fs-md{font-size:18px;--fs-base:18}
html.fs-lg{font-size:20px;--fs-base:20}
body{background:var(--bg-primary);color:var(--text-primary);font-family:'Noto Sans SC','JetBrains Mono',sans-serif;min-height:100vh;overflow-x:hidden;
padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}
.mono{font-family:'JetBrains Mono',monospace;overflow-wrap:break-word}

/* Scanline effect */
body::after{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;
background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px)}

/* Header */
.header{padding:16px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:linear-gradient(180deg,#111827 0%,var(--bg-primary) 100%)}
.header-left{display:flex;align-items:center;gap:16px}
.logo{font-family:'JetBrains Mono',monospace;font-size:1.1rem;font-weight:700;letter-spacing:2px;color:var(--cyan);text-shadow:0 0 20px var(--cyan-glow)}
.logo span{color:var(--yellow)}
.btc-price{display:flex;align-items:baseline;gap:8px}
.btc-price .price{font-family:'JetBrains Mono',monospace;font-size:1.8rem;font-weight:700;
background:linear-gradient(90deg,#fff 60%,var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.btc-price .change{font-family:'JetBrains Mono',monospace;font-size:.85rem;padding:2px 8px;border-radius:4px}
.change.up{background:var(--green-bg);color:var(--green)}
.change.down{background:var(--red-bg);color:var(--red)}
.header-right{display:flex;align-items:center;gap:16px}
.timestamp{font-family:'JetBrains Mono',monospace;font-size:.75rem;color:var(--text-muted)}
.refresh-btn{background:var(--bg-card);border:1px solid var(--border);color:var(--text-secondary);padding:6px 14px;border-radius:6px;cursor:pointer;font-size:.8rem;font-family:'JetBrains Mono',monospace;transition:.2s}
.refresh-btn:hover{border-color:var(--cyan);color:var(--cyan);box-shadow:0 0 12px var(--cyan-glow)}

/* Font Size Toggle */
.fs-toggle{display:flex;gap:2px;background:var(--bg-card);border:1px solid var(--border);border-radius:6px;overflow:hidden}
.fs-toggle button{background:none;border:none;color:var(--text-muted);padding:4px 10px;cursor:pointer;font-family:'JetBrains Mono',monospace;font-weight:500;transition:.2s;line-height:1}
.fs-toggle button:hover{color:var(--text-secondary)}
.fs-toggle button.active{background:var(--cyan);color:var(--bg-primary);font-weight:700}

/* Traffic Light */
.traffic-light-bar{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:12px}
.signal-main{flex:1;padding:20px 24px;border-radius:12px;display:flex;align-items:center;gap:20px;position:relative;overflow:hidden}
.signal-main.green{background:linear-gradient(135deg,#10b98112,#10b98108);border:1px solid #10b98130}
.signal-main.yellow{background:linear-gradient(135deg,#f59e0b12,#f59e0b08);border:1px solid #f59e0b30}
.signal-main.red{background:linear-gradient(135deg,#ef444412,#ef444408);border:1px solid #ef444430}
.signal-icon{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.6rem;flex-shrink:0}
.signal-main.green .signal-icon{background:radial-gradient(circle,#10b981,#059669);box-shadow:0 0 30px var(--green-glow);animation:signalPulse 3s ease-in-out infinite}
.signal-main.yellow .signal-icon{background:radial-gradient(circle,#f59e0b,#d97706);box-shadow:0 0 30px var(--yellow-glow);animation:signalPulse 3s ease-in-out infinite}
.signal-main.red .signal-icon{background:radial-gradient(circle,#ef4444,#dc2626);box-shadow:0 0 30px var(--red-glow);animation:signalPulse 2s ease-in-out infinite}
@keyframes signalPulse{0%,100%{box-shadow:0 0 20px var(--green-glow)}50%{box-shadow:0 0 40px var(--green-glow),0 0 60px var(--green-glow)}}
.signal-content h2{font-size:1.15rem;font-weight:700;margin-bottom:4px}
.signal-content p{font-size:.85rem;color:var(--text-secondary);line-height:1.5}
.signal-stats{display:flex;gap:12px;margin-left:auto;flex-shrink:0}
.signal-stat{text-align:center;padding:8px 16px;background:rgba(0,0,0,.3);border-radius:8px;min-width:90px}
.signal-stat label{font-size:.65rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:4px}
.signal-stat .val{font-family:'JetBrains Mono',monospace;font-size:1rem;font-weight:600}

/* Grid */
.dashboard{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);padding:0}
.module{background:var(--bg-primary);padding:20px}
.module-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.module-num{font-family:'JetBrains Mono',monospace;font-size:.65rem;font-weight:700;padding:3px 8px;border-radius:4px;letter-spacing:1px}
.m1 .module-num{background:var(--purple-glow);color:var(--purple)}
.m2 .module-num{background:var(--red-glow);color:var(--red)}
.m3 .module-num{background:var(--blue-glow);color:var(--blue)}
.m4 .module-num{background:var(--yellow-glow);color:var(--yellow)}
.m5 .module-num{background:#f9731640;color:var(--orange)}
.m6 .module-num{background:#3b82f640;color:var(--blue)}
.module-title{font-size:.95rem;font-weight:700;letter-spacing:.5px}
.module-subtitle{font-size:.7rem;color:var(--text-muted);margin-left:auto;font-family:'JetBrains Mono',monospace}

/* Metric Card */
.metric-card{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px;transition:all .3s ease}
.metric-card:hover{border-color:var(--border-active);transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,0,0,.3)}
.metric-card:last-child{margin-bottom:0}
.metric-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.metric-name{font-size:.8rem;font-weight:500;color:var(--text-secondary)}
.metric-badge{font-family:'JetBrains Mono',monospace;font-size:.65rem;padding:2px 8px;border-radius:4px;font-weight:600}
.badge-safe{background:var(--green-bg);color:var(--green)}
.badge-warn{background:var(--yellow-bg);color:var(--yellow)}
.badge-danger{background:var(--red-bg);color:var(--red)}
.metric-value-row{display:flex;align-items:baseline;gap:12px;margin-bottom:8px}
.metric-value{font-family:'JetBrains Mono',monospace;font-size:1.6rem;font-weight:700}
.metric-sub{font-family:'JetBrains Mono',monospace;font-size:.8rem;color:var(--text-muted)}
.metric-bar{height:6px;background:#1e293b;border-radius:3px;overflow:hidden;margin-bottom:10px}
.metric-bar-fill{height:100%;border-radius:3px;transition:width .8s ease}
.metric-explain{font-size:.75rem;color:var(--text-secondary);line-height:1.6;padding:10px 12px;background:var(--bg-card-alt);border-radius:6px;border-left:3px solid var(--border)}
.metric-explain strong{color:var(--text-primary)}

/* Chart Container */
.chart-wrap{position:relative;height:100px;margin:12px 0}
.chart-wrap canvas{width:100%!important;height:100%!important}

/* Gauge */
.gauge{display:flex;align-items:center;gap:16px;margin:10px 0}
.gauge-visual{width:80px;height:40px;position:relative}
.gauge-arc{stroke-dasharray:126;stroke-dashoffset:0;transition:stroke-dashoffset .8s}
.gauge-label{font-family:'JetBrains Mono',monospace;font-size:.75rem;color:var(--text-muted)}

/* Safety Calculator */
.calc-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.calc-item{background:var(--bg-card-alt);padding:12px;border-radius:8px;text-align:center}
.calc-item label{font-size:.65rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:6px}
.calc-item .val{font-family:'JetBrains Mono',monospace;font-size:1.2rem;font-weight:700}
.calc-item .val.green{color:var(--green)}.calc-item .val.red{color:var(--red)}.calc-item .val.yellow{color:var(--yellow)}.calc-item .val.cyan{color:var(--cyan)}

/* Level Lines */
.level-line{display:flex;align-items:center;padding:8px 12px;margin-bottom:6px;border-radius:6px;background:var(--bg-card-alt);font-family:'JetBrains Mono',monospace;font-size:.8rem}
.level-dot{width:8px;height:8px;border-radius:50%;margin-right:10px;flex-shrink:0}
.level-label{color:var(--text-muted);margin-right:auto;font-size:.75rem}
.level-price{font-weight:600}
.level-pct{color:var(--text-muted);margin-left:8px;font-size:.75rem}

/* Event Timer */
.event-item{display:flex;align-items:center;padding:12px;margin-bottom:8px;border-radius:8px;background:var(--bg-card);border:1px solid var(--border)}
.event-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem;margin-right:12px;flex-shrink:0}
.event-icon.fed{background:#7c3aed20;color:#a78bfa}
.event-icon.cpi{background:#f59e0b20;color:#fbbf24}
.event-icon.nfp{background:#ef444420;color:#f87171}
.event-icon.token{background:#06b6d420;color:#22d3ee}
.event-info{flex:1}
.event-name{font-size:.8rem;font-weight:600}
.event-date{font-size:.7rem;color:var(--text-muted);font-family:'JetBrains Mono',monospace}
.event-countdown{font-family:'JetBrains Mono',monospace;font-size:.85rem;font-weight:700;text-align:right}
.event-countdown.urgent{color:var(--red);text-shadow:0 0 10px var(--red-glow)}
.event-countdown.normal{color:var(--text-secondary)}

/* Heatmap */
.heatmap{position:relative;height:120px;margin:12px 0;background:var(--bg-card-alt);border-radius:8px;overflow:hidden;border:1px solid var(--border)}
.heatmap-bar{position:absolute;bottom:0;border-radius:2px 2px 0 0;transition:height .8s ease}
.heatmap-bar:hover{opacity:1!important;filter:brightness(1.3)}
.heatmap-marker{position:absolute;width:2px;height:100%;z-index:2;
background:linear-gradient(180deg,transparent,var(--text-primary),transparent)}
.heatmap-marker::after{content:'▼ 现价';position:absolute;top:2px;left:6px;font-size:.6rem;color:var(--text-primary);font-family:'JetBrains Mono',monospace;white-space:nowrap;text-shadow:0 0 6px rgba(0,0,0,.8)}

/* Recommendation Box */
.rec-box{margin-top:16px;padding:16px 20px;border-radius:10px;border:1px dashed}
.rec-box.green{border-color:#10b98150;background:#10b98108}
.rec-box.yellow{border-color:#f59e0b50;background:#f59e0b08}
.rec-box.red{border-color:#ef444450;background:#ef444408}
.rec-title{font-size:.85rem;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.rec-body{font-size:.78rem;color:var(--text-secondary);line-height:1.7}
.rec-body strong{color:var(--text-primary)}

/* Sparkline inline */
.sparkline{display:inline-block;vertical-align:middle}

/* Animations */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.metric-card{animation:slideUp .4s ease both}
.metric-card:nth-child(2){animation-delay:.1s}
.metric-card:nth-child(3){animation-delay:.2s}

/* Pulse dot */
.pulse-dot{width:8px;height:8px;border-radius:50%;display:inline-block;animation:pulse 2s infinite}
.pulse-dot.green{background:var(--green);box-shadow:0 0 8px var(--green-glow)}
.pulse-dot.red{background:var(--red);box-shadow:0 0 8px var(--red-glow)}
.pulse-dot.yellow{background:var(--yellow);box-shadow:0 0 8px var(--yellow-glow)}

/* Vol chart canvas */
.vol-chart{width:100%;height:120px;margin:8px 0}

/* ═══ Responsive: Tablet (≤900px) ═══ */
@media(max-width:900px){
html{font-size:16px}
html.fs-sm{font-size:13px}
html.fs-md{font-size:16px}
html.fs-lg{font-size:18px}
.dashboard{grid-template-columns:1fr}
.traffic-light-bar{flex-direction:column;padding:12px 16px}
.signal-main{flex-direction:column;align-items:flex-start;padding:16px}
.signal-stats{margin-left:0;margin-top:12px;width:100%;justify-content:space-between}
.signal-stat{flex:1}
.header{padding:12px 16px}
.btc-price .price{font-size:1.5rem}
.module{padding:16px}
.calc-item .val{font-size:1rem}
#module5 > div:last-child{grid-template-columns:1fr 1fr!important}
#module6 > div:last-child{grid-template-columns:1fr 1fr!important}
}

/* ═══ Responsive: Mobile (≤600px) ═══ */
@media(max-width:600px){
html{font-size:15px}
html.fs-sm{font-size:12px}
html.fs-md{font-size:15px}
html.fs-lg{font-size:17px}

/* Header: stack vertically */
.header{flex-direction:column;align-items:flex-start;gap:10px;padding:12px 14px}
.header-left{flex-direction:column;align-items:flex-start;gap:6px;width:100%}
.header-right{width:100%;justify-content:space-between;gap:8px}
.logo{font-size:.95rem;letter-spacing:1.5px}
.fs-toggle button{padding:6px 12px;font-size:.8rem;min-height:36px}
.btc-price{width:100%}
.btc-price .price{font-size:1.6rem}
.btc-price .change{font-size:.75rem}
.refresh-btn{padding:8px 12px;font-size:.75rem;flex-shrink:0}
.timestamp{font-size:.7rem}

/* Traffic Light */
.traffic-light-bar{padding:10px 12px;gap:10px}
.signal-main{flex-direction:column;align-items:flex-start;gap:12px;padding:14px}
.signal-icon{width:44px;height:44px;font-size:1.3rem}
.signal-content h2{font-size:1rem}
.signal-content p{font-size:.78rem}
.signal-stats{flex-wrap:wrap;gap:8px;margin-left:0;margin-top:8px;width:100%}
.signal-stat{flex:1 1 40%;min-width:0;padding:6px 10px}
.signal-stat label{font-size:.6rem}
.signal-stat .val{font-size:.9rem}

/* Modules */
.module{padding:12px}
.module-header{flex-wrap:wrap;gap:6px;margin-bottom:12px;padding-bottom:10px}
.module-num{font-size:.6rem;padding:2px 6px}
.module-title{font-size:.88rem}
.module-subtitle{font-size:.65rem;width:100%;margin-left:0;margin-top:2px}

/* Metric Cards */
.metric-card{padding:12px;margin-bottom:10px}
.metric-name{font-size:.75rem}
.metric-badge{font-size:.6rem;padding:2px 6px}
.metric-value{font-size:1.3rem}
.metric-sub{font-size:.7rem}
.metric-explain{font-size:.72rem;padding:8px 10px}

/* Calc Grid: stack on small screens */
.calc-grid{grid-template-columns:1fr 1fr;gap:8px}
.calc-item{padding:10px 8px}
.calc-item label{font-size:.6rem}
.calc-item .val{font-size:.95rem;word-break:break-all}

/* Level Lines */
.level-line{padding:6px 10px;font-size:.75rem;flex-wrap:wrap;gap:4px}
.level-label{font-size:.7rem}
.level-price{font-size:.8rem}
.level-pct{font-size:.68rem}

/* Events */
.event-item{padding:10px;flex-wrap:wrap;gap:8px}
.event-icon{width:32px;height:32px;font-size:.9rem;margin-right:8px}
.event-name{font-size:.75rem}
.event-date{font-size:.65rem}
.event-countdown{font-size:.78rem}

/* Heatmap */
.heatmap{height:90px}

/* IV/RV Chart */
.vol-chart{height:60px}

/* Recommendation box in traffic light */
.rec-box{flex:0 0 auto!important;width:100%;padding:12px 14px}
.rec-title{font-size:.8rem}
.rec-body{font-size:.72rem}

/* Put/Call skew bar text */
.metric-card div[style*="flex:"] {font-size:.6rem!important}

/* M5/M6 modules stack on mobile */
#module5 > div:last-child{grid-template-columns:1fr!important}
#module6 > div:last-child{grid-template-columns:1fr!important}
}

/* ═══ Responsive: Small Mobile (≤380px) ═══ */
@media(max-width:380px){
html{font-size:14px}
html.fs-sm{font-size:11px}
html.fs-md{font-size:14px}
html.fs-lg{font-size:16px}
.btc-price .price{font-size:1.4rem}
.signal-stats{gap:6px}
.signal-stat{padding:5px 6px}
.calc-grid{grid-template-columns:1fr}
.calc-item .val{font-size:.88rem}
.metric-value{font-size:1.15rem}
.level-line{padding:5px 8px}
.event-item{padding:8px}

/* Ensure long mono values don't overflow */
.mono{word-break:break-all}
}

/* ═══ Touch-friendly enhancements ═══ */
@media(hover:none) and (pointer:coarse){
.refresh-btn{padding:10px 16px;font-size:.85rem;min-height:44px}
.fs-toggle button{padding:8px 14px;min-height:44px}
.metric-card{-webkit-tap-highlight-color:transparent}
.event-item{min-height:48px}
}

/* ═══ Landscape phone ═══ */
@media(max-height:500px) and (orientation:landscape){
.header{padding:8px 14px}
.traffic-light-bar{padding:8px 12px}
.signal-main{padding:10px 14px}
.signal-icon{width:36px;height:36px;font-size:1rem}
.module{padding:10px}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">DUAL<span>WIN</span> TERMINAL</div>
    <div class="btc-price">
      <span class="price" id="btcPrice">$---,---</span>
      <span class="change up" id="btcChange">+0.00%</span>
    </div>
  </div>
  <div class="header-right">
    <div class="timestamp" id="timestamp">--</div>
    <div class="fs-toggle" id="langToggle">
      <button onclick="setLang('zh')" title="中文">中</button>
      <button onclick="setLang('en')" title="English">EN</button>
    </div>
    <div class="fs-toggle" id="fsToggle">
      <button onclick="setFontSize('sm')" title="小字号">小</button>
      <button onclick="setFontSize('md')" class="active" title="中字号">中</button>
      <button onclick="setFontSize('lg')" title="大字号">大</button>
    </div>
    <button class="refresh-btn" onclick="forceRefresh()"><span data-i18n="refresh">⟳ 刷新数据</span></button>
  </div>
</div>

<div class="traffic-light-bar" id="trafficLight">
  <!-- Populated by JS -->
</div>

<div class="dashboard">
  <!-- Module 1 -->
  <div class="module m1" id="module1"></div>
  <!-- Module 2 -->
  <div class="module m2" id="module2"></div>
  <!-- Module 3 -->
  <div class="module m3" id="module3"></div>
  <!-- Module 4 -->
  <div class="module m4" id="module4"></div>
  <!-- Module 5: MSTR -->
  <div class="module m5" id="module5" style="grid-column:1/-1"></div>
  <!-- Module 6: Derivatives -->
  <div class="module m6" id="module6" style="grid-column:1/-1"></div>
</div>

<script>
// ─── Font Size Toggle ───
function setFontSize(size) {
  document.documentElement.classList.remove('fs-sm', 'fs-md', 'fs-lg');
  document.documentElement.classList.add('fs-' + size);
  document.querySelectorAll('#fsToggle button').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.trim() === {sm:'小',md:'中',lg:'大'}[size]);
  });
  try { localStorage.setItem('dualwin-fs', size); } catch(e) {}
}
try {
  const saved = localStorage.getItem('dualwin-fs');
  if (saved && ['sm','md','lg'].includes(saved)) setFontSize(saved);
} catch(e) {}

// ─── i18n (国际化) ───
let currentLang = 'zh';
const I18N = {
  zh: {
    refresh: '⟳ 刷新数据', refreshing: '⟳ 刷新中...', refreshFail: '⟳ 刷新失败', forceRefresh: '⟳ 强制刷新...',
    sellPut: '📉 低买 Sell Put', sellCall: '📈 高卖 Sell Call',
    suggestAPY: '建议年化', orderPrice: '挂单价', positionCap: '仓位上限', targetAPY: '目标年化',
    tenorMatrix: '期限 × APR 矩阵', todayPlan: '执行方案',
    globalVeto: '⛔ 全局否决门触发', strangleRec: '🎯 宽跨式双卖推荐 (Sell Strangle)',
    fuse: '熔断', position: '建议仓位', dataAge: '前更新',
    weekend: '🏖️ 建议不做新单，资金保留在活期理财',
    tokyoTime: '东京', localTime: '本地',
    dayNames: ['日','一','二','三','四','五','六'], today: '今日是',
    // Module headers

// Translate backend string (pass-through if zh or not found)
function tB(s) {
  if (!s || currentLang === 'zh') return s;
  // Exact match
  if (BE_MAP[s]) return BE_MAP[s];
  // Partial match for dynamic strings
  let r = s;
  for (const [zh, en] of Object.entries(BE_MAP)) {
    if (r.includes(zh)) r = r.replace(zh, en);
  }
  return r;
}

function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('#langToggle button').forEach(btn => {
    btn.classList.toggle('active', (lang === 'zh' && btn.textContent.trim() === '中') || (lang === 'en' && btn.textContent.trim() === 'EN'));
  });
  try { localStorage.setItem('dualwin-lang', lang); } catch(e) {}
  // Re-render if we have data
  if (lastData) refreshData();
}

// Detect browser language
(function initLang() {
  try {
    const saved = localStorage.getItem('dualwin-lang');
    if (saved && ['zh','en'].includes(saved)) { currentLang = saved; }
    else {
      const bl = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
      currentLang = bl.startsWith('zh') ? 'zh' : 'en';
    }
  } catch(e) { currentLang = 'en'; }
  document.querySelectorAll('#langToggle button').forEach(btn => {
    btn.classList.toggle('active', (currentLang === 'zh' && btn.textContent.trim() === '中') || (currentLang === 'en' && btn.textContent.trim() === 'EN'));
  });
})();

// ─── Timezone Utilities ───
function formatMultiTZ() {
  const now = new Date();
  const opts = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
  const tokyo = now.toLocaleTimeString('ja-JP', { ...opts, timeZone: 'Asia/Tokyo' });
  const localTZ = Intl.DateTimeFormat().resolvedOptions().timeZone;
  const localCity = localTZ.split('/').pop().replace(/_/g,' ');
  const dateStr = now.toLocaleDateString(currentLang === 'zh' ? 'zh-CN' : 'en-US', { year:'numeric', month:'numeric', day:'numeric' });

  // If local timezone is Tokyo, only show once
  if (localTZ === 'Asia/Tokyo') {
    return `${dateStr} | ${t('tokyoTime')} ${tokyo}`;
  }
  const local = now.toLocaleTimeString(undefined, opts);
  return `${dateStr} | ${t('tokyoTime')} ${tokyo} | ${localCity} ${local}`;
}

const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
  ? `http://${window.location.hostname}:3000`
  : '';  // 同源部署

let lastData = null; // 缓存上次成功的数据

async function fetchDashboardData() {
  try {
    const res = await fetch(`${API_BASE}/api/dashboard`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    lastData = json;
    return json;
  } catch (err) {
    console.error('[API] 拉取失败:', err.message);
    return lastData; // 返回上次缓存
  }
}

/** 将后端返回数据转换为前端渲染所需格式 */
function transformData(raw) {
  const price = raw.price?.price || 0;
  const change = raw.price?.change24h || 0;

  // 波动率 (来自 Deribit)
  const iv = raw.volatility?.iv || 50;
  const rv = raw.volatility?.rv || 40;
  const skew = raw.volatility?.skew || { putIV: 48, callIV: 42, skew: 6 };

  // 技术指标 (来自 Binance K 线计算)
  const bb = raw.technicals?.bb || { width: 6, squeeze: false, percentile: 50 };
  const adx = raw.technicals?.adx || { value: 20, trend: 'flat', di_plus: 22, di_minus: 18 };
  const atr = raw.technicals?.atr || { value: 2500, pct: 3, safe15x: 4.5 };

  // 分形支撑/阻力
  const fractals = raw.fractals || { resistances: [], supports: [] };

  // 清算数据
  const liqZones = raw.liquidation?.zones || raw.liquidation?.data || [];
  const liqSource = raw.liquidation?.source || 'unknown';

  // 宏观事件 → 转换日期对象
  const events = (raw.macro?.events || []).map(e => ({
    ...e,
    date: new Date(e.date),
  }));

  return {
    price, change, iv, rv, skew, bb, adx, atr, fractals, liqZones, liqSource, events,
    mstr: raw.mstr || null,
    derivatives: raw.derivatives || null,
    maxPain: raw.volatility?.maxPain || null,
  };
}

// ─── Decision Logic (前端兜底，后端v2引擎优先) ───
function computeDecision(data) {
  const e = { score:0, grade:'加载中', color:'yellow', apy:'0%', factors:[], vetoes:[], alerts:[], strike:{pct:0,price:0} };
  return { sellPut:{...e}, sellCall:{...e}, strangle:null, globalVetoes:[], topAdvice:[], maxPainHint:null, meta:{signal:'yellow'} };
}

function renderModule4(data) {
  const liqZones = data.liqZones;
  const maxVol = Math.max(...liqZones.map(z => z.volume));
  const events = data.events;
  const now = Date.now();

  const liqBarsHTML = liqZones.map((z, i) => {
    const left = (i / liqZones.length) * 100;
    const height = Math.max(5, (z.volume / maxVol) * 100);
    const barW = 100/liqZones.length - 0.5;
    const isLong = z.side === 'long';
    const grad = isLong
      ? 'linear-gradient(0deg, #10b98140, #10b981cc)'
      : 'linear-gradient(0deg, #ef444440, #ef4444cc)';
    const glow = isLong ? '0 0 8px #10b98150' : '0 0 8px #ef444450';
    return `<div class="heatmap-bar" style="left:${left}%;width:${barW}%;height:${height}%;background:${grad};box-shadow:${glow}" title="${isLong?'多头':'空头'}清算 $${fmt(z.price)} 量:${z.volume.toFixed(0)}"></div>`;
  }).join('');

  // Find where current price falls in the range
  const minP = Math.min(...liqZones.map(z => z.price));
  const maxP = Math.max(...liqZones.map(z => z.price));
  const pricePos = ((data.price - minP) / (maxP - minP)) * 100;

  const eventsHTML = events.length > 0 ? events.map(e => {
    // Support both backend pre-computed fields and client-side date objects
    let hours, days, remH, isUrgent, countdown;
    if (e.hoursUntil !== undefined) {
      hours = e.hoursUntil;
      days = Math.floor(hours / 24);
      remH = hours % 24;
      isUrgent = e.isUrgent;
      countdown = e.countdown;
    } else {
      const diff = (e.date instanceof Date ? e.date.getTime() : new Date(e.date).getTime()) - now;
      hours = Math.floor(diff / 3600000);
      days = Math.floor(hours / 24);
      remH = hours % 24;
      isUrgent = hours < 24;
      countdown = days > 0 ? `${days}天${remH}小时` : `${hours}小时`;
    }
    const dateObj = e.date instanceof Date ? e.date : new Date(e.date);
    const dateStr = !isNaN(dateObj) ? `${dateObj.toLocaleDateString('zh-CN',{month:'short',day:'numeric'})} ${dateObj.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})}` : '';
    return `
      <div class="event-item" style="${isUrgent ? 'border-color:var(--red);background:var(--red-bg)' : ''}">
        <div class="event-icon ${e.icon}">${e.icon === 'fed' ? '🏦' : e.icon === 'cpi' ? '📊' : e.icon === 'nfp' ? '👷' : '🔓'}</div>
        <div class="event-info">
          <div class="event-name">${e.name}${e.impact === 'high' ? ' <span style="color:var(--red);font-size:.65rem">●高影响</span>' : ''}</div>
          <div class="event-date">${dateStr}</div>
        </div>
        <div class="event-countdown ${isUrgent ? 'urgent' : 'normal'}">${isUrgent ? '⚠ ' : ''}${countdown}</div>
      </div>
    `;
  }).join('') : '<div style="padding:16px;text-align:center;color:var(--text-muted);font-size:.8rem">${t("noEvents")}</div>';

  // Find major liquidation cluster
  const longLiqs = liqZones.filter(z => z.side === 'long').sort((a,b) => b.volume - a.volume);
  const shortLiqs = liqZones.filter(z => z.side === 'short').sort((a,b) => b.volume - a.volume);
  const majorLongCluster = longLiqs[0];
  const majorShortCluster = shortLiqs[0];

  document.getElementById('module4').innerHTML = `
    <div class="module-header">
      <span class="module-num">M4</span>
      <span class="module-title">${t('m4Title')}</span>
      <span class="module-subtitle">${t('m4Sub')}</span>
    </div>

    <div class="metric-card">
      <div class="metric-top">
        <span class="metric-name">${t('liqTitle')}</span>
        <span class="metric-badge badge-warn">72h 窗口 · ${data.liqSource === 'coinglass' ? 'Coinglass' : '基于持仓估算'}</span>
      </div>
      <div class="heatmap">
        ${liqBarsHTML}
        <div class="heatmap-marker" style="left:${pricePos}%"></div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:.65rem;font-family:'JetBrains Mono',monospace;color:var(--text-muted);margin-bottom:10px">
        <span>$${fmt(minP)}</span>
        <span style="color:var(--green)">${t('longLiq')}</span>
        <span style="color:var(--red)">${t('shortLiq')}</span>
        <span>$${fmt(maxP)}</span>
      </div>
      ${majorLongCluster ? `
      <div class="level-line">
        <div class="level-dot" style="background:var(--green)"></div>
        <span class="level-label">${t('maxLongCluster')}</span>
        <span class="level-price" style="color:var(--green)">$${fmt(majorLongCluster.price)}</span>
        <span class="level-pct">${((majorLongCluster.price - data.price) / data.price * 100).toFixed(2)}%</span>
      </div>` : ''}
      ${majorShortCluster ? `
      <div class="level-line">
        <div class="level-dot" style="background:var(--red)"></div>
        <span class="level-label">${t('maxShortCluster')}</span>
        <span class="level-price" style="color:var(--red)">$${fmt(majorShortCluster.price)}</span>
        <span class="level-pct">${((majorShortCluster.price - data.price) / data.price * 100).toFixed(2)}%</span>
      </div>` : ''}
      <div class="metric-explain">
        <strong>${t('decisionLogic')}：</strong>做市商喜欢"扫损"。你的"低买"执行价必须放在多头爆仓区间的下方，去接带血的筹码。
        ${majorLongCluster ? `当前${t('maxLongCluster')}在 $${fmt(majorLongCluster.price)}，低买执行价应低于此位置。` : ''}
      </div>
    </div>

    <div class="metric-card">
      <div class="metric-top">
        <span class="metric-name">${t('macroTitle')}</span>
        <span class="metric-badge badge-${events.some(e => e.isUrgent || ((e.date instanceof Date ? e.date.getTime() : new Date(e.date).getTime()) - now) < 86400000) ? 'danger' : 'safe'}">
          ${events.some(e => e.isUrgent || ((e.date instanceof Date ? e.date.getTime() : new Date(e.date).getTime()) - now) < 86400000) ? t('macroUrgent') : t('macroSafe')}
        </span>
      </div>
      ${eventsHTML}
      <div class="metric-explain">
        <strong>${t('decisionLogic')}：</strong>重大数据公布前 24 小时内，直接将策略降级到最保守的 5-10% 年化。
        事件驱动的瞬间振幅往往超过 5%，双币赢极易被击穿。
      </div>
    </div>
  `;
}

// ─── Draw IV/RV History Chart ───
function drawIVRVChart(iv, rv) {
  const canvas = document.getElementById('ivrvChart');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width = canvas.offsetWidth * 2;
  const H = canvas.height = 240;
  ctx.scale(1, 1);

  // Generate history
  const pts = 30;
  const ivHist = [], rvHist = [];
  let ivV = iv - 5 + Math.random() * 10, rvV = rv - 3 + Math.random() * 6;
  for (let i = 0; i < pts; i++) {
    ivV += (Math.random() - 0.5) * 3;
    rvV += (Math.random() - 0.5) * 2;
    ivHist.push(Math.max(10, ivV));
    rvHist.push(Math.max(10, rvV));
  }
  ivHist.push(iv);
  rvHist.push(rv);

  const all = [...ivHist, ...rvHist];
  const minV = Math.min(...all) - 5;
  const maxV = Math.max(...all) + 5;
  const padTop = 20, padBot = 20, padLeft = 35, padRight = 50;
  const chartW = W - padLeft - padRight;
  const chartH = H - padTop - padBot;

  function toX(i) { return padLeft + (i / pts) * chartW; }
  function toY(v) { return padTop + chartH - ((v - minV) / (maxV - minV)) * chartH; }

  // Grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = padTop + (chartH / 4) * i;
    ctx.beginPath(); ctx.moveTo(padLeft, y); ctx.lineTo(W - padRight, y); ctx.stroke();
    const val = maxV - ((maxV - minV) / 4) * i;
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.font = '16px JetBrains Mono';
    ctx.textAlign = 'right';
    ctx.fillText(val.toFixed(0) + '%', padLeft - 6, y + 5);
  }

  // Spread fill with gradient
  const spreadGrad = ctx.createLinearGradient(0, padTop, 0, H - padBot);
  if (iv > rv) {
    spreadGrad.addColorStop(0, 'rgba(16,185,129,0.15)');
    spreadGrad.addColorStop(1, 'rgba(16,185,129,0.02)');
  } else {
    spreadGrad.addColorStop(0, 'rgba(239,68,68,0.15)');
    spreadGrad.addColorStop(1, 'rgba(239,68,68,0.02)');
  }
  ctx.beginPath();
  for (let i = 0; i <= pts; i++) { const x = toX(i), y = toY(ivHist[i]); i===0?ctx.moveTo(x,y):ctx.lineTo(x,y); }
  for (let i = pts; i >= 0; i--) { ctx.lineTo(toX(i), toY(rvHist[i])); }
  ctx.closePath();
  ctx.fillStyle = spreadGrad;
  ctx.fill();

  // Smooth curve helper
  function drawSmoothLine(data, color, lineW, dash) {
    ctx.beginPath();
    ctx.strokeStyle = color;
    ctx.lineWidth = lineW;
    ctx.setLineDash(dash || []);
    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';
    for (let i = 0; i < data.length; i++) {
      const x = toX(i), y = toY(data[i]);
      if (i === 0) { ctx.moveTo(x, y); continue; }
      // Bezier smoothing
      const px = toX(i-1), py = toY(data[i-1]);
      const cpx = (px + x) / 2;
      ctx.bezierCurveTo(cpx, py, cpx, y, x, y);
    }
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // IV line glow
  ctx.save();
  ctx.shadowColor = '#a855f7';
  ctx.shadowBlur = 8;
  drawSmoothLine(ivHist, '#a855f7', 3);
  ctx.restore();
  drawSmoothLine(ivHist, '#a855f7', 2.5);

  // RV line
  drawSmoothLine(rvHist, '#06b6d4', 2, [6, 4]);

  // End dots
  const ivEndX = toX(pts), ivEndY = toY(iv);
  const rvEndX = toX(pts), rvEndY = toY(rv);

  ctx.beginPath(); ctx.arc(ivEndX, ivEndY, 5, 0, Math.PI*2);
  ctx.fillStyle = '#a855f7'; ctx.fill();
  ctx.strokeStyle = '#0a0e17'; ctx.lineWidth = 2; ctx.stroke();

  ctx.beginPath(); ctx.arc(rvEndX, rvEndY, 4, 0, Math.PI*2);
  ctx.fillStyle = '#06b6d4'; ctx.fill();
  ctx.strokeStyle = '#0a0e17'; ctx.lineWidth = 2; ctx.stroke();

  // Labels with background
  function drawLabel(text, x, y, color) {
    ctx.font = 'bold 18px JetBrains Mono';
    const w = ctx.measureText(text).width + 12;
    ctx.fillStyle = color + '20';
    ctx.beginPath();
    ctx.roundRect(x, y - 12, w, 20, 4);
    ctx.fill();
    ctx.fillStyle = color;
    ctx.textAlign = 'left';
    ctx.fillText(text, x + 6, y + 4);
  }
  drawLabel(`IV ${iv.toFixed(0)}%`, ivEndX + 8, ivEndY, '#a855f7');
  drawLabel(`RV ${rv.toFixed(0)}%`, rvEndX + 8, rvEndY, '#06b6d4');
}

// ─── Main Refresh ───
async function refreshData() {
  document.querySelector('.refresh-btn').textContent = t('refreshing');

  const raw = await fetchDashboardData();
  if (!raw) {
    document.querySelector('.refresh-btn').textContent = t('refreshFail');
    return;
  }

  const { price, change, iv, rv, skew, bb, adx, atr, fractals, liqZones, liqSource, events, mstr, derivatives, maxPain } = transformData(raw);
  const data = { price, iv, rv, skew, bb, adx, atr, fractals, liqZones, liqSource, events, mstr, derivatives, maxPain };

  // 使用后端计算的决策（更准确），回退到前端计算
  const decision = raw.decision || computeDecision(data);

  // Update header
  document.getElementById('btcPrice').textContent = `$${fmt(price)}`;
  const changeEl = document.getElementById('btcChange');
  changeEl.textContent = `${change >= 0 ? '+' : ''}${change.toFixed(2)}%`;
  changeEl.className = `change ${change >= 0 ? 'up' : 'down'}`;

  // 显示数据新鲜度 + 多时区
  const meta = raw.meta;
  const ageSec = meta ? (meta.ageSeconds || Math.round((Date.now() - new Date(meta.lastRefresh).getTime()) / 1000)) : 0;
  const ageStr = ageSec ? `${ageSec}s ${t('dataAge')}` : '';
  document.getElementById('timestamp').textContent =
    formatMultiTZ() + (ageStr ? ` · ${ageStr}` : '');

  renderTrafficLight(decision, data);
  renderReasons(decision);
  renderModule1(data);
  renderModule2(data);
  renderModule3(data);
  renderModule4(data);
  renderModule5(data);
  renderModule6(data);

  setTimeout(() => drawIVRVChart(iv, rv), 100);
  document.querySelector('.refresh-btn').textContent = t('refresh');
}

async function forceRefresh() {
  document.querySelector('.refresh-btn').textContent = t('forceRefresh');
  try {
    await fetch(`${API_BASE}/api/refresh`, { method: 'POST' });
  } catch(e) {}
  await refreshData();
}

// Init
refreshData();
// 前端每 60 秒从后端读一次缓存（后端每 5 分钟拉取新数据）
setInterval(refreshData, 60000);
</script>
</body>
